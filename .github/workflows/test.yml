name: Tests

on:
  pull_request:
    branches:
      - develop

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  test:
    name: Run test suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run server tests
        id: server-tests
        run: yarn test-server --runInBand
        continue-on-error: true
        env:
          CI: true
          JEST_JUNIT_OUTPUT_DIR: test-results
          JEST_JUNIT_OUTPUT_NAME: junit-server.xml

      - name: Run client tests
        id: client-tests
        run: |
          echo "=== Diagnostics ==="
          echo "Node: $(node --version)"
          which sharetribe-scripts && echo "sharetribe-scripts in PATH" || echo "sharetribe-scripts NOT in PATH"
          ls ./node_modules/.bin/sharetribe-scripts && echo "binary exists" || echo "binary NOT found"
          echo "Test files found: $(find src -name '*.test.js' | wc -l)"
          echo "=== Running tests ==="
          mkdir -p test-results
          ./node_modules/.bin/sharetribe-scripts test --runInBand --testResultsProcessor=jest-junit
          echo "=== Exit code: $? ==="
          echo "=== test-results contents ==="
          ls -la test-results/ || echo "directory empty or missing"
        continue-on-error: true
        env:
          CI: true
          JEST_JUNIT_OUTPUT_DIR: test-results
          JEST_JUNIT_OUTPUT_NAME: junit-client.xml

      - name: Post test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Test Results
          path: test-results/junit-*.xml
          reporter: jest-junit
          fail-on-error: false

      - name: Fail if tests failed
        if: steps.server-tests.outcome == 'failure' || steps.client-tests.outcome == 'failure'
        run: exit 1
